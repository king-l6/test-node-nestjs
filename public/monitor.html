<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盖楼监控</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --text-dim: #a1a1aa;
      --accent: #dc2626;
      --green: #16a34a;
      --yellow: #d97706;
      --blue: #2563eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      min-height: 100vh;
    }

    /* Header */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s infinite;
    }

    .brand h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .brand h1 span {
      color: var(--text);
    }

    .stats-row {
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .stats-row .val {
      color: var(--text);
      font-weight: 600;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
    }

    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-knob {
      transform: translateX(14px);
    }

    /* Grid */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .article-card {
      background: var(--card);
      padding: 20px 24px;
    }

    .article-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .article-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      line-height: 1.5;
    }

    .article-title a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
    }

    .article-title a:hover {
      color: var(--accent);
    }

    .article-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .floor-counter {
      text-align: right;
      margin-left: 16px;
    }

    .floor-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .floor-label {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Floor chips */
    .floor-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      border: 1px solid transparent;
    }

    .chip-next {
      background: #fffbeb;
      color: var(--yellow);
      border-color: #fde68a;
      animation: glow 1.5s ease-in-out infinite;
    }

    .chip-wait {
      background: #eff6ff;
      color: var(--blue);
      border-color: #bfdbfe;
    }

    .chip-far {
      background: var(--bg);
      color: var(--text-dim);
      border-color: var(--border);
    }

    .chip-hit {
      background: #f0fdf4;
      color: var(--green);
      border-color: var(--green);
    }

    .chip-miss {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }

    .chip-ungrab {
      background: #fffbeb;
      color: #d97706;
      border-color: #fde68a;
    }

    .prize-card {
      background: var(--card);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .prize-target {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .prize-info {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .prize-info a {
      color: var(--text);
      text-decoration: none;
    }

    .prize-info a:hover {
      color: var(--accent);
    }

    /* Progress */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 10px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
      font-size: 12px;
      background: var(--card);
    }

    .count {
      color: var(--accent);
      font-weight: 600;
    }

    /* Section labels */
    .section-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .section-label .count {
      color: var(--accent);
      font-weight: 600;
    }

    .bottom-info {
      margin-top: 20px;
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 rgba(217, 119, 6, 0); }
      50% { box-shadow: 0 0 8px rgba(217, 119, 6, 0.2); }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="brand">
      <div class="brand-dot"></div>
      <h1><span>FLOOR</span>-SCANNER</h1>
    </div>
    <div class="stats-row">
      <span>监控 <span class="val" id="s-monitor">0</span></span>
      <span>过期 <span class="val" id="s-expire">0</span></span>
      <span>间隔 <span class="val" id="s-interval">-</span>s</span>
    </div>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="autoRefresh" checked>
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </label>
      AUTO
    </div>
  </div>

  <div class="section-label">监控中 <span class="count" id="badge-m">0</span></div>
  <div class="grid" id="monitoring"></div>

  <div style="margin-top: 24px;"></div>
  <div class="section-label">已过期 <span class="count" id="badge-e">0</span></div>
  <div class="grid" id="expired"></div>

  <div style="margin-top: 24px;"></div>
  <div class="section-label">🏆 中奖信息</div>
  <div class="grid" id="prizes"></div>

  <div class="bottom-info" id="lastUpdate"></div>

  <div style="margin-top: 12px; text-align: center;">
    <button id="verifyBtn" onclick="verifyAll()" style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 20px;font-size:11px;cursor:pointer;color:var(--text);font-family:inherit;">🔄 验证抢楼结果</button>
    <button onclick="loadRecords()" style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 20px;font-size:11px;cursor:pointer;color:var(--text);font-family:inherit;margin-left:8px;">📋 本地记录</button>
    <span id="verifyStatus" style="margin-left:8px;font-size:10px;color:var(--text-dim);"></span>
  </div>

  <!-- 本地记录弹窗 -->
  <div id="recordsModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--card);border-radius:8px;max-width:600px;width:90%;max-height:80vh;overflow:auto;padding:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <span style="font-size:13px;font-weight:600;">🏆 本地中奖记录</span>
        <span onclick="document.getElementById('recordsModal').style.display='none'" style="cursor:pointer;font-size:18px;color:var(--text-dim);">&times;</span>
      </div>
      <div id="recordsContent" style="font-size:11px;color:var(--text-dim);text-align:center;padding:24px 0;">加载中...</div>
    </div>
  </div>

  <script>
    let timer;

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return '刚刚发布';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前发布';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前发布';
      return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    async function poll() {
      try {
        const res = await fetch('/api/monitor');
        const data = await res.json();
        render(data);
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
      } catch (e) {
        console.error(e);
      }
    }

    function render(d) {
      document.getElementById('s-monitor').textContent = d.summary.monitoringCount;
      document.getElementById('s-expire').textContent = d.summary.expiredCount;
      document.getElementById('s-interval').textContent = d.summary.checkInterval || '-';
      document.getElementById('badge-m').textContent = d.summary.monitoringCount;
      document.getElementById('badge-e').textContent = d.summary.expiredCount;

      function floorChip(f, currentFloor, isNext) {
        if (f.grabbed) {
          const hit = f.landedFloor ? ` (命中${f.landedFloor})` : '';
          const v = f.verified === true ? ' ✓' : f.verified === false ? ' ⚠' : '';
          const cls = f.verified === true ? 'chip-hit' : f.verified === false ? 'chip-ungrab' : 'chip-hit';
          return `<span class="chip ${cls}">✓ ${f.floorNum}${hit}${v}</span>`;
        }
        if (f.claimed) {
          return `<span class="chip chip-miss">✗ ${f.floorNum}</span>`;
        }
        let cls = isNext ? 'chip-next' :
                  currentFloor >= f.floorNum - 30 ? 'chip-wait' :
                  'chip-far';
        return `<span class="chip ${cls}">${f.floorNum}</span>`;
      }

      const m = document.getElementById('monitoring');
      if (!d.monitoring.length) {
        m.innerHTML = '<div class="empty">空闲中</div>';
      } else {
        m.innerHTML = d.monitoring.map(a => {
          const chips = a.targetFloors.map(f => floorChip(f, a.currentFloor, f.floorNum === a.nextTarget)).join('');
          const pct = a.targetFloors.length ? Math.round(a.claimedCount / a.targetFloors.length * 100) : 0;
          return `
            <div class="article-card">
              <div class="article-head">
                <div class="article-title">
                  <a href="${a.url}" target="_blank">${a.title}</a>
                  <div class="article-time">${formatTime(a.publishTime)}</div>
                </div>
                <div class="floor-counter">
                  <div class="floor-num">${a.currentFloor || '-'}</div>
                  <div class="floor-label">CURRENT</div>
                </div>
              </div>
              <div class="floor-chips">${chips}</div>
              <div class="progress-row">
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
                <div class="progress-text">${a.claimedCount}/${a.targetFloors.length}</div>
              </div>
            </div>`;
        }).join('');
      }

      const e = document.getElementById('expired');
      if (!d.expired.length) {
        e.innerHTML = '<div class="empty">—</div>';
      } else {
        e.innerHTML = d.expired.map(a => {
          const chips = a.targetFloors.map(f => floorChip(f, 999999)).join('');
          return `
            <div class="article-card">
              <div class="article-head">
                <div class="article-title">
                  <a href="${a.url}" target="_blank">${a.title}</a>
                  <div class="article-time">${formatTime(a.publishTime)}</div>
                </div>
                <div class="floor-counter">
                  <div class="floor-num" style="font-size:14px;color:var(--text)">${a.grabbedCount}/${a.totalCount}</div>
                  <div class="floor-label">HIT</div>
                </div>
              </div>
              <div class="floor-chips">${chips}</div>
            </div>`;
        }).join('');
      }

      // 汇总所有抢到的楼层（领奖信息）
      const prizes = [];
      for (const a of d.monitoring) {
        for (const f of a.targetFloors) {
          if (f.grabbed) prizes.push({ title: a.title, url: a.url, target: f.floorNum, landed: f.landedFloor });
        }
      }
      for (const a of d.expired) {
        for (const f of a.targetFloors) {
          if (f.grabbed) prizes.push({ title: a.title, url: a.url, target: f.floorNum, landed: f.landedFloor });
        }
      }
      const el = document.getElementById('prizes');
      if (!prizes.length) {
        el.innerHTML = '<div class="empty">暂无中奖记录</div>';
      } else {
        el.innerHTML = prizes.map(p => `
          <div class="prize-card">
            <div class="prize-target">🎯 楼层 ${p.target}</div>
            <div class="prize-info">命中 <strong>${p.landed || '?'}</strong> 层 · <a href="${p.url}" target="_blank">${p.title}</a></div>
          </div>`).join('');
      }
    }

    async function verifyAll() {
      const status = document.getElementById('verifyStatus');
      const btn = document.getElementById('verifyBtn');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = '⏳ 验证中...';
      status.textContent = '请求中...';
      try {
        const res = await fetch('/api/verify');
        const data = await res.json();
        if (!Array.isArray(data)) {
          status.textContent = '验证失败: ' + JSON.stringify(data);
          return;
        }
        const ok = data.filter(r => r.verified).length;
        const fail = data.filter(r => !r.verified).length;
        status.textContent = `验证完成: ${ok} 个命中确认, ${fail} 个需手动核实`;
        poll();
      } catch (e) {
        status.textContent = '请求失败: ' + e.message;
      }
      btn.disabled = false;
      btn.textContent = '🔄 验证抢楼结果';
    }

    async function loadRecords() {
      document.getElementById('recordsModal').style.display = 'flex';
      document.getElementById('recordsContent').textContent = '加载中...';
      try {
        const res = await fetch('/api/records');
        const data = await res.json();
        const el = document.getElementById('recordsContent');
        if (!data.length) {
          el.innerHTML = '<div style="padding:24px 0;">暂无记录</div>';
        } else {
          el.innerHTML = data.map(r => {
            const u = r.url || `https://bbplanet.bilibili.co/pc/#/detail?tId=${r.businessId}&h=4`;
            return `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);text-align:left;">
              <div style="flex:1;">
                <div style="font-size:12px;font-weight:500;color:var(--text);">🎯 楼层 ${r.floorNum} ${r.landedFloor !== r.floorNum ? `(命中${r.landedFloor})` : ''}</div>
                <div style="font-size:10px;color:var(--text-dim);margin-top:4px;"><a href="${u}" target="_blank" style="color:var(--text);text-decoration:none;">${r.title}</a></div>
                <div style="font-size:10px;color:var(--text-dim);margin-top:2px;">评论: "${r.commentContent}" · ${new Date(r.verifiedAt).toLocaleString('zh-CN')}</div>
              </div>
              <span style="font-size:10px;color:var(--green);background:#f0fdf4;padding:2px 8px;border-radius:4px;white-space:nowrap;">✓ 已确认</span>
            </div>`;
          }).join('');
        }
      } catch (e) {
        document.getElementById('recordsContent').textContent = '加载失败: ' + e.message;
      }
    }

    function toggle() {
      clearInterval(timer);
      if (document.getElementById('autoRefresh').checked) {
        timer = setInterval(poll, 3000);
      }
    }

    document.getElementById('autoRefresh').addEventListener('change', toggle);
    poll();
    toggle();
  </script>
</body>
</html>
