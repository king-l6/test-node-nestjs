<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盖楼监控</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --text-dim: #a1a1aa;
      --accent: #dc2626;
      --green: #16a34a;
      --yellow: #d97706;
      --blue: #2563eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      min-height: 100vh;
    }

    /* Header */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 2s infinite;
    }

    .brand h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .brand h1 span {
      color: var(--text);
    }

    .stats-row {
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .stats-row .val {
      color: var(--text);
      font-weight: 600;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
    }

    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-knob {
      transform: translateX(14px);
    }

    /* Grid */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .article-card {
      background: var(--card);
      padding: 20px 24px;
    }

    .article-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .article-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      line-height: 1.5;
    }

    .article-title a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
    }

    .article-title a:hover {
      color: var(--accent);
    }

    .floor-counter {
      text-align: right;
      margin-left: 16px;
    }

    .floor-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .floor-label {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Floor chips */
    .floor-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .chip {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      border: 1px solid transparent;
    }

    .chip-done {
      background: #f0fdf4;
      color: var(--green);
      border-color: #bbf7d0;
    }

    .chip-next {
      background: #fffbeb;
      color: var(--yellow);
      border-color: #fde68a;
      animation: glow 1.5s ease-in-out infinite;
    }

    .chip-wait {
      background: #eff6ff;
      color: var(--blue);
      border-color: #bfdbfe;
    }

    .chip-far {
      background: var(--bg);
      color: var(--text-dim);
      border-color: var(--border);
    }

    /* Progress */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 10px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Expired */
    .expired-card {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .expired-title {
      font-size: 12px;
      color: var(--text-dim);
    }

    .expired-tag {
      font-size: 10px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 3px;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
      font-size: 12px;
      background: var(--card);
    }

    /* Section labels */
    .section-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .section-label .count {
      color: var(--accent);
      font-weight: 600;
    }

    .bottom-info {
      margin-top: 20px;
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 rgba(245, 158, 11, 0); }
      50% { box-shadow: 0 0 6px rgba(245, 158, 11, 0.3); }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="brand">
      <div class="brand-dot"></div>
      <h1><span>FLOOR</span>-SCANNER</h1>
    </div>
    <div class="stats-row">
      <span>监控 <span class="val" id="s-monitor">0</span></span>
      <span>过期 <span class="val" id="s-expire">0</span></span>
      <span>间隔 <span class="val" id="s-interval">-</span>s</span>
    </div>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="autoRefresh" checked>
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </label>
      AUTO
    </div>
  </div>

  <div class="section-label">监控中 <span class="count" id="badge-m">0</span></div>
  <div class="grid" id="monitoring"></div>

  <div style="margin-top: 24px;"></div>
  <div class="section-label">已过期 <span class="count" id="badge-e">0</span></div>
  <div class="grid" id="expired"></div>

  <div class="bottom-info" id="lastUpdate"></div>

  <script>
    let timer;

    async function poll() {
      try {
        const res = await fetch('/api/monitor');
        const data = await res.json();
        render(data);
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
      } catch (e) {
        console.error(e);
      }
    }

    function render(d) {
      document.getElementById('s-monitor').textContent = d.summary.monitoringCount;
      document.getElementById('s-expire').textContent = d.summary.expiredCount;
      document.getElementById('s-interval').textContent = d.summary.checkInterval || '-';
      document.getElementById('badge-m').textContent = d.summary.monitoringCount;
      document.getElementById('badge-e').textContent = d.summary.expiredCount;

      const m = document.getElementById('monitoring');
      if (!d.monitoring.length) {
        m.innerHTML = '<div class="empty">空闲中</div>';
      } else {
        m.innerHTML = d.monitoring.map(a => {
          const chips = a.targetFloors.map(f => {
            let cls = f.claimed ? 'chip-done' :
                      f.floorNum === a.nextTarget ? 'chip-next' :
                      a.currentFloor >= f.floorNum - 30 ? 'chip-wait' :
                      'chip-far';
            return `<span class="chip ${cls}">${f.floorNum}</span>`;
          }).join('');

          const pct = a.targetFloors.length ? Math.round(a.claimedCount / a.targetFloors.length * 100) : 0;

          return `
            <div class="article-card">
              <div class="article-head">
                <div class="article-title"><a href="${a.url}" target="_blank">${a.title}</a></div>
                <div class="floor-counter">
                  <div class="floor-num">${a.currentFloor || '-'}</div>
                  <div class="floor-label">CURRENT</div>
                </div>
              </div>
              <div class="floor-chips">${chips}</div>
              <div class="progress-row">
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
                <div class="progress-text">${a.claimedCount}/${a.targetFloors.length}</div>
              </div>
            </div>`;
        }).join('');
      }

      const e = document.getElementById('expired');
      if (!d.expired.length) {
        e.innerHTML = '<div class="empty">—</div>';
      } else {
        e.innerHTML = d.expired.map(a => `
          <div class="expired-card">
            <div class="expired-title">${a.title}</div>
            <div class="expired-tag">DONE</div>
          </div>`).join('');
      }
    }

    function toggle() {
      clearInterval(timer);
      if (document.getElementById('autoRefresh').checked) {
        timer = setInterval(poll, 3000);
      }
    }

    document.getElementById('autoRefresh').addEventListener('change', toggle);
    poll();
    toggle();
  </script>
</body>
</html>
