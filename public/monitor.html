<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盖楼监控面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .header h1 { font-size: 24px; margin-bottom: 12px; }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat { background: rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 8px; min-width: 120px; }
    .stat-value { font-size: 28px; font-weight: bold; }
    .stat-label { font-size: 12px; opacity: 0.9; }
    .section { margin-bottom: 24px; }
    .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .badge { background: #667eea; color: white; padding: 2px 10px; border-radius: 12px; font-size: 14px; }
    .badge-warning { background: #ff9800; }
    .badge-success { background: #4caf50; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: 600; color: #333; flex: 1; }
    .card-title a { color: #333; text-decoration: none; transition: all 0.2s; cursor: pointer; }
    .card-title a:hover { color: #1a73e8; text-decoration: underline; }
    .current-floor-box { text-align: center; padding: 12px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; color: white; min-width: 120px; }
    .current-floor-label { font-size: 11px; opacity: 0.9; }
    .current-floor-value { font-size: 32px; font-weight: bold; line-height: 1.2; }
    .floor-section { margin-bottom: 12px; }
    .floor-section-title { font-size: 13px; color: #666; margin-bottom: 8px; }
    .floor-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .floor-tag { padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
    .floor-pending { background: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; }
    .floor-next { background: #fff3e0; color: #e65100; border: 2px solid #ff9800; animation: pulse 1.5s infinite; font-weight: 600; }
    .floor-claimed { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .floor-far { background: #f5f5f5; color: #999; border: 1px solid #e0e0e0; }
    .expired-card { background: #fafafa; border: 1px dashed #ddd; }
    .expired-title { color: #999; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .refresh-info { color: #666; font-size: 12px; margin-top: 16px; text-align: center; }
    .auto-refresh { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.3); border-radius: 24px; transition: 0.3s; }
    .toggle .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle input:checked + .slider { background: #4caf50; }
    .toggle input:checked + .slider:before { transform: translateX(20px); }
    .next-target { display: inline-block; background: #ff9800; color: white; padding: 4px 12px; border-radius: 16px; font-size: 13px; font-weight: 600; margin-top: 8px; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; margin-top: 12px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); border-radius: 3px; transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="header">
    <h1>盖楼监控面板</h1>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="monitoringCount">0</div>
        <div class="stat-label">监控中</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="expiredCount">0</div>
        <div class="stat-label">已过期</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="checkInterval">-</div>
        <div class="stat-label">检查间隔(秒)</div>
      </div>
    </div>
    <div class="auto-refresh">
      <label class="toggle">
        <input type="checkbox" id="autoRefresh" checked>
        <span class="slider"></span>
      </label>
      <span style="color: white; font-size: 14px;">自动刷新 (3秒)</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">
      监控中的帖子
      <span class="badge" id="monitoringBadge">0</span>
    </div>
    <div id="monitoringArticles"></div>
  </div>

  <div class="section">
    <div class="section-title">
      已盖满的帖子
      <span class="badge badge-success" id="expiredBadge">0</span>
    </div>
    <div id="expiredArticles"></div>
  </div>

  <div class="refresh-info" id="lastUpdate"></div>

  <script>
    let refreshTimer;

    async function fetchStatus() {
      try {
        const res = await fetch('/api/monitor');
        const data = await res.json();
        render(data);
        document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleTimeString();
      } catch (err) {
        console.error('获取状态失败:', err);
      }
    }

    function render(data) {
      // 更新统计
      document.getElementById('monitoringCount').textContent = data.summary.monitoringCount;
      document.getElementById('expiredCount').textContent = data.summary.expiredCount;
      document.getElementById('monitoringBadge').textContent = data.summary.monitoringCount;
      document.getElementById('expiredBadge').textContent = data.summary.expiredCount;
      document.getElementById('checkInterval').textContent = data.summary.checkInterval || '-';

      // 渲染监控中的帖子
      const monitoringContainer = document.getElementById('monitoringArticles');
      if (data.monitoring.length === 0) {
        monitoringContainer.innerHTML = '<div class="card empty">暂无监控中的帖子</div>';
      } else {
        monitoringContainer.innerHTML = data.monitoring.map(article => {
          const floorsHtml = article.targetFloors.map(f => {
            let cls = 'floor-far';
            if (f.claimed) {
              cls = 'floor-claimed';
            } else if (f.floorNum === article.nextTarget) {
              cls = 'floor-next';
            } else if (article.currentFloor >= f.floorNum - 50) {
              cls = 'floor-pending';
            }
            return `<span class="floor-tag ${cls}">${f.floorNum}${f.claimed ? ' ✓' : ''}</span>`;
          }).join('');

          const progress = article.claimedCount / article.targetFloors.length * 100;

          return `
            <div class="card">
              <div class="card-header">
                <div class="card-title"><a href="${article.url}" target="_blank" style="color: #333; text-decoration: none;">${article.title}</a></div>
                <div class="current-floor-box">
                  <div class="current-floor-label">当前楼层</div>
                  <div class="current-floor-value">${article.currentFloor || '-'}</div>
                </div>
              </div>
              <div class="floor-section">
                <div class="floor-section-title">目标楼层 (已抢 ${article.claimedCount}/${article.targetFloors.length})</div>
                <div class="floor-list">${floorsHtml}</div>
              </div>
              ${article.nextTarget ? `<div class="next-target">下一个目标: ${article.nextTarget}楼</div>` : '<div class="next-target" style="background: #4caf50;">所有目标已完成!</div>'}
              <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
              <div class="refresh-info">发布时间: ${article.publishTime}</div>
            </div>
          `;
        }).join('');
      }

      // 渲染已过期的帖子
      const expiredContainer = document.getElementById('expiredArticles');
      if (data.expired.length === 0) {
        expiredContainer.innerHTML = '<div class="card empty">暂无已过期帖子</div>';
      } else {
        expiredContainer.innerHTML = data.expired.map(article => `
          <div class="card expired-card">
            <div class="card-title expired-title">${article.title}</div>
            <div class="refresh-info">所有目标楼层已过</div>
          </div>
        `).join('');
      }
    }

    function toggleAutoRefresh() {
      const enabled = document.getElementById('autoRefresh').checked;
      if (enabled) {
        refreshTimer = setInterval(fetchStatus, 3000);
      } else {
        clearInterval(refreshTimer);
      }
    }

    document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh);

    fetchStatus();
    toggleAutoRefresh();
  </script>
</body>
</html>
